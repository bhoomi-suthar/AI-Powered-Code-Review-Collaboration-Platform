<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Profile — AI Code Review</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">CodeReview AI</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="analytics.html">Analytics</a>
            <span id="username-display"></span>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container" style="max-width:700px; margin:0 auto;">

        <h2 style="margin-bottom:24px; color:#222;">My Profile</h2>

        <!-- Profile Info Card -->
        <div class="card" style="margin-bottom:24px;">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
                <div style="display:flex; align-items:center; gap:20px;">
                    <div id="avatar-circle"
                        style="width:70px; height:70px; border-radius:50%; background:#4a6cf7; color:#fff; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; flex-shrink:0;">
                    </div>
                    <div>
                        <div id="profile-username" style="font-size:20px; font-weight:700; color:#222;"></div>
                        <div id="profile-email" style="font-size:14px; color:#888; margin-top:4px;"></div>
                        <div id="profile-role" style="margin-top:6px;"></div>
                    </div>
                </div>
                <button onclick="deleteAccount()"
                    style="background:none; border:1px solid #e74c3c; color:#e74c3c; border-radius:8px; padding:8px 16px; cursor:pointer; font-size:13px; font-weight:600; white-space:nowrap;">
                    Delete Account
                </button>
            </div>

            <!-- Delete Modal Step 1 -->
            <div id="delete-modal"
                style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
                <div
                    style="background:#fff; border-radius:16px; padding:32px; width:420px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.2);">
                    <h3 style="color:#222; margin-bottom:8px;">Delete Account?</h3>
                    <p style="color:#888; font-size:14px; margin-bottom:24px;">All your projects, files and reviews will
                        be permanently deleted.This cannot be undone!</p>
                    <div style="display:flex; gap:12px; justify-content:center;">
                        <button onclick="showStep2()"
                            style="background:#e74c3c; color:#fff; border:none; border-radius:8px; padding:10px 24px; cursor:pointer; font-size:14px; font-weight:600;">Continue</button>
                        <button onclick="document.getElementById('delete-modal').style.display='none'"
                            style="background:#f0f0f0; color:#333; border:none; border-radius:8px; padding:10px 24px; cursor:pointer; font-size:14px;">Cancel</button>
                    </div>
                </div>
            </div>


            <!-- Stats -->
            <div style="display:flex; gap:16px; flex-wrap:wrap; padding-top:16px; border-top:1px solid #f0f0f0;">
                <div style="text-align:center; flex:1;">
                    <div id="p-projects" style="font-size:22px; font-weight:700; color:#4a6cf7;">0</div>
                    <div style="font-size:12px; color:#888;">Projects</div>
                </div>
                <div style="text-align:center; flex:1;">
                    <div id="p-files" style="font-size:22px; font-weight:700; color:#4a6cf7;">0</div>
                    <div style="font-size:12px; color:#888;">Files</div>
                </div>
                <div style="text-align:center; flex:1;">
                    <div id="p-reviews" style="font-size:22px; font-weight:700; color:#4a6cf7;">0</div>
                    <div style="font-size:12px; color:#888;">Reviews</div>
                </div>
                <div style="text-align:center; flex:1;">
                    <div id="p-commits" style="font-size:22px; font-weight:700; color:#4a6cf7;">0</div>
                    <div style="font-size:12px; color:#888;">Commits</div>
                </div>
            </div>
        </div>   

        <!-- Change Username -->
        <div class="card" style="margin-bottom:24px;">
            <h3 style="margin-bottom:16px;">Update Username</h3>
            <div class="form-group">
                <label>New Username</label>
                <input type="text" id="new-username" placeholder="Enter new username"
                    style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:6px;">
            </div>
            <div id="username-alert" style="margin:10px 0;"></div>
            <button class="btn btn-primary" onclick="updateUsername()" style="margin-top:8px;">Update Username</button>
        </div>

        <!-- Change Password -->
        <div class="card" style="margin-bottom:24px;">
            <h3 style="margin-bottom:16px;">Change Password</h3>
            <div class="form-group" style="margin-bottom:12px;">
                <label>Current Password</label>
                <input type="password" id="current-password" placeholder="Enter current password"
                    style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:6px;">
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="Enter new password"
                    style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:6px;">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm new password"
                    style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:6px;">
            </div>
            <div id="password-alert" style="margin:10px 0;"></div>
            <button class="btn btn-primary" onclick="changePassword()" style="margin-top:8px;">Change Password</button>
        </div>

    </div>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
