<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — AI Code Review</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f9;
        }
        .auth-box {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .auth-box h1 { font-size: 24px; margin-bottom: 8px; color: #222; }
        .auth-box p  { color: #888; font-size: 14px; margin-bottom: 28px; }
        .auth-box .logo { font-size: 22px; font-weight: 800; color: #4a6cf7; margin-bottom: 24px; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
        .auth-footer a { color: #4a6cf7; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">CodeReview AI</div>
            <h1>Create Account</h1>

            <div id="alert"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="yourname">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                    <option value="superuser">Super User</option>
                </select>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="register()">Register</button>

            <div class="auth-footer">
                Already have an account? <a href="index.html">Login</a>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
